<!DOCTYPE html>
<html>
<head>
<title>Sunglasses Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
 margin:0;
 font-family: 'Segoe UI';
 background:#111;
 color:white;
}

/* HEADER */
header {
 background:black;
 padding:15px;
 text-align:center;
 font-size:22px;
}

/* LAYOUT */
.main {
 display:flex;
}

/* LEFT PANEL */
.sidebar {
 width:25%;
 background:#1c1c1c;
 padding:15px;
 height:100vh;
}

.sidebar input {
 width:90%;
 padding:10px;
 margin:5px;
}

.sidebar button {
 padding:10px;
 width:100%;
 background:#ff6600;
 color:white;
 border:none;
}

/* RIGHT PRODUCTS */
.content {
 width:75%;
 padding:20px;
}

/* SEARCH */
.search {
 width:100%;
 padding:10px;
 margin-bottom:15px;
}

/* PRODUCT GRID */
.products {
 display:grid;
 grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
 gap:15px;
}

.product {
 background:white;
 color:black;
 padding:10px;
 border-radius:10px;
 text-align:center;
}

.product img {
 width:100%;
 border-radius:10px;
}

button {
 margin-top:5px;
 padding:8px;
 background:#ff6600;
 color:white;
 border:none;
 cursor:pointer;
}

.hidden { display:none; }

</style>
</head>

<body>

<header>👓 Sunglasses Home Trial</header>

<div class="main">

<!-- LEFT SIDE (FORM) -->
<div class="sidebar">

<h3>Book Trial</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile">
<input id="product" placeholder="Selected Product" readonly>

<button onclick="saveData()">Submit</button>

<br><br>
<button onclick="showUserLogin()">User Login</button>
<button onclick="showAdminLogin()">Admin</button>

</div>

<!-- RIGHT SIDE (PRODUCTS) -->
<div class="content">

<input class="search" placeholder="🔍 Search Sunglasses..." onkeyup="searchProduct(this.value)">

<div class="products" id="productList">

<!-- PRODUCTS -->
<script>
let products = [
 "Black Stylish","Classic Brown","Blue Modern",
 "Sport Black","Premium Gold","Retro Round",
 "Aviator Silver","Luxury Black","Cool Blue",
 "Dark Green","Urban Style","Night Vision"
];

let html="";
products.forEach(p=>{
 html += `
 <div class="product">
 <img src="https://via.placeholder.com/200">
 <h4>${p}</h4>
 <button onclick="selectProduct('${p}')">Select</button>
 </div>`;
});

document.write(html);
</script>

</div>

</div>

</div>

<script>

// SELECT PRODUCT
function selectProduct(p){
 document.getElementById("product").value = p;
}

// SAVE DATA
function saveData(){
 let data = JSON.parse(localStorage.getItem("trial")) || [];

 data.push({
  name: document.getElementById("name").value,
  phone: document.getElementById("phone").value,
  product: document.getElementById("product").value
 });

 localStorage.setItem("trial", JSON.stringify(data));
 alert("Trial Booked!");
}

// SEARCH
function searchProduct(val){
 let items = document.querySelectorAll(".product");

 items.forEach(item=>{
  if(item.innerText.toLowerCase().includes(val.toLowerCase())){
   item.style.display="block";
  } else {
   item.style.display="none";
  }
 });
}

// USER LOGIN
function showUserLogin(){
 let phone = prompt("Enter Mobile Number");
 let data = JSON.parse(localStorage.getItem("trial")) || [];

 let user = data.find(d=>d.phone===phone);

 if(user){
  alert("Name: "+user.name+"\nProduct: "+user.product);
 } else {
  alert("No record found");
 }
}

// ADMIN LOGIN
function showAdminLogin(){
 let pass = prompt("Enter Admin Password (1234)");

 if(pass==="1234"){
  let data = JSON.parse(localStorage.getItem("trial")) || [];
  console.log(data);
  alert("Check console for data");
 } else {
  alert("Wrong password");
 }
}

</script>

</body>
</html>
