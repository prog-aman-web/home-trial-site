<!DOCTYPE html>
<html>
<head>
<title>Sunglasses Store Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
 margin:0;
 font-family: 'Segoe UI';
 background:#111;
 color:white;
}

/* HEADER */
header {
 background:black;
 padding:15px;
 text-align:center;
 font-size:22px;
}

/* LAYOUT */
.main {
 display:flex;
}

/* SIDEBAR */
.sidebar {
 width:25%;
 background:#1c1c1c;
 padding:15px;
 height:100vh;
}

.sidebar input {
 width:90%;
 padding:10px;
 margin:5px;
}

.sidebar button {
 padding:10px;
 width:100%;
 background:#ff6600;
 color:white;
 border:none;
 margin-top:5px;
}

/* CONTENT */
.content {
 width:75%;
 padding:20px;
}

.search {
 width:100%;
 padding:10px;
 margin-bottom:15px;
}

/* PRODUCTS */
.products {
 display:grid;
 grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
 gap:15px;
}

.product {
 background:white;
 color:black;
 padding:10px;
 border-radius:10px;
 text-align:center;
}

.product img {
 width:100%;
 border-radius:10px;
}

/* BUTTONS */
.btn {
 padding:8px;
 margin:3px;
 background:#ff6600;
 color:white;
 border:none;
 cursor:pointer;
}

/* TABLE */
table {
 width:90%;
 margin:auto;
 background:white;
 color:black;
 border-collapse: collapse;
}

th, td {
 border:1px solid #ddd;
 padding:10px;
}

.hidden { display:none; }

</style>
</head>

<body>

<header>👓 Sunglasses Store Pro</header>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>Trial Form</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile">
<input id="product" placeholder="Selected Product" readonly>

<button onclick="saveTrial()">Submit Trial</button>

<h3>Menu</h3>
<button onclick="viewWishlist()">Wishlist ❤️</button>
<button onclick="viewCart()">Cart 🛒</button>
<button onclick="adminLogin()">Admin</button>

</div>

<!-- CONTENT -->
<div class="content">

<input class="search" placeholder="🔍 Search..." onkeyup="searchProduct(this.value)">

<div class="products" id="products"></div>

<!-- CART -->
<div id="cartPage" class="hidden">
<h2>🛒 Cart</h2>
<ul id="cartList"></ul>
</div>

<!-- WISHLIST -->
<div id="wishPage" class="hidden">
<h2>❤️ Wishlist</h2>
<ul id="wishList"></ul>
</div>

<!-- ADMIN -->
<div id="adminPage" class="hidden">
<h2>📊 Dashboard</h2>
<p id="stats"></p>

<table>
<tr><th>Name</th><th>Phone</th><th>Product</th></tr>
<tbody id="data"></tbody>
</table>
</div>

</div>

</div>

<script>

/* PRODUCTS DATA (REAL IMAGES) */
let products = [
 {name:"Black Stylish", img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083"},
 {name:"Classic Brown", img:"https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f"},
 {name:"Blue Modern", img:"https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb"},
 {name:"Aviator Silver", img:"https://images.unsplash.com/photo-1491553895911-0055eca6402d"},
 {name:"Luxury Gold", img:"https://images.unsplash.com/photo-1487412912498-0447578fcca8"},
 {name:"Sport Black", img:"https://images.unsplash.com/photo-1517841905240-472988babdf9"}
];

/* LOAD PRODUCTS */
function loadProducts(){
 let html="";
 products.forEach(p=>{
  html+=`
  <div class="product">
   <img src="${p.img}">
   <h4>${p.name}</h4>
   <button class="btn" onclick="selectProduct('${p.name}')">Select</button>
   <button class="btn" onclick="addWishlist('${p.name}')">❤️</button>
   <button class="btn" onclick="addCart('${p.name}')">🛒</button>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}

loadProducts();

/* SELECT */
function selectProduct(p){
 document.getElementById("product").value=p;
}

/* SEARCH */
function searchProduct(val){
 let items=document.querySelectorAll(".product");
 items.forEach(i=>{
  i.style.display=i.innerText.toLowerCase().includes(val.toLowerCase())?"block":"none";
 });
}

/* TRIAL SAVE */
function saveTrial(){
 let data=JSON.parse(localStorage.getItem("trial"))||[];

 data.push({
  name: name.value,
  phone: phone.value,
  product: product.value
 });

 localStorage.setItem("trial",JSON.stringify(data));
 alert("Trial Booked!");
}

/* WISHLIST */
function addWishlist(p){
 let w=JSON.parse(localStorage.getItem("wish"))||[];
 w.push(p);
 localStorage.setItem("wish",JSON.stringify(w));
 alert("Added to Wishlist");
}

function viewWishlist(){
 hideAll();
 let w=JSON.parse(localStorage.getItem("wish"))||[];
 wishList.innerHTML=w.map(i=>"<li>"+i+"</li>").join("");
 wishPage.classList.remove("hidden");
}

/* CART */
function addCart(p){
 let c=JSON.parse(localStorage.getItem("cart"))||[];
 c.push(p);
 localStorage.setItem("cart",JSON.stringify(c));
 alert("Added to Cart");
}

function viewCart(){
 hideAll();
 let c=JSON.parse(localStorage.getItem("cart"))||[];
 cartList.innerHTML=c.map(i=>"<li>"+i+"</li>").join("");
 cartPage.classList.remove("hidden");
}

/* ADMIN */
function adminLogin(){
 let pass=prompt("Enter Admin Password (1234)");
 if(pass==="1234"){
  showAdmin();
 }
}

function showAdmin(){
 hideAll();
 adminPage.classList.remove("hidden");

 let data=JSON.parse(localStorage.getItem("trial"))||[];
 data.forEach(d=>{
  data.innerHTML+=`<tr><td>${d.name}</td><td>${d.phone}</td><td>${d.product}</td></tr>`;
 });

 stats.innerHTML="Total Users: "+data.length;
}

/* NAV */
function hideAll(){
 cartPage.classList.add("hidden");
 wishPage.classList.add("hidden");
 adminPage.classList.add("hidden");
}

</script>

</body>
</html>
