<!DOCTYPE html>
<html>
<head>
<title>Sunglasses Home Trial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
 margin:0;
 font-family: Arial;
 background: url('https://images.unsplash.com/photo-1511499767150-a48a237f0083') no-repeat center center/cover;
 color:white;
}

.overlay {
 background: rgba(0,0,0,0.7);
 min-height:100vh;
 padding:20px;
}

header {
 text-align:center;
 font-size:26px;
 font-weight:bold;
 margin-bottom:20px;
}

.card {
 background:white;
 color:black;
 padding:20px;
 border-radius:10px;
 width:300px;
 margin:10px auto;
 box-shadow:0 5px 15px rgba(0,0,0,0.3);
 text-align:center;
}

input {
 width:90%;
 padding:10px;
 margin:5px;
}

button {
 padding:10px 20px;
 background:#ff6600;
 color:white;
 border:none;
 border-radius:5px;
 cursor:pointer;
}

.hidden { display:none; }

table {
 width:95%;
 margin:auto;
 background:white;
 color:black;
 border-collapse: collapse;
}

th, td {
 border:1px solid black;
 padding:10px;
}
</style>
</head>

<body>

<div class="overlay">

<header>👓 Sunglasses Store - Home Trial</header>

<!-- HOME -->
<div id="home" class="card">
<h3>Book Trial</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile Number">
<input id="product" placeholder="Sunglass Type">
<button onclick="saveData()">Submit</button>

<br><br>
<button onclick="showUserLogin()">User Login</button>
<button onclick="showAdminLogin()">Admin Login</button>
</div>

<!-- USER LOGIN -->
<div id="userLogin" class="card hidden">
<h3>User Login (Mobile)</h3>
<input id="loginPhone" placeholder="Enter Mobile Number">
<button onclick="userLogin()">Login</button>
</div>

<!-- USER PROFILE -->
<div id="userProfile" class="card hidden">
<h3>Your Profile</h3>
<p id="profileData"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="card hidden">
<h3>Admin Login</h3>
<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin" class="hidden">
<h2 style="text-align:center;">📊 All Trial Users</h2>

<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Product</th>
</tr>
<tbody id="data"></tbody>
</table>

<br>
<div style="text-align:center;">
<button onclick="logout()">Logout</button>
</div>
</div>

</div>

<script>

// SAVE DATA
function saveData(){
 let data = JSON.parse(localStorage.getItem("trial")) || [];

 let user = {
  name: document.getElementById("name").value,
  phone: document.getElementById("phone").value,
  product: document.getElementById("product").value
 };

 data.push(user);
 localStorage.setItem("trial", JSON.stringify(data));

 alert("Trial Booked!");
}

// USER LOGIN
function userLogin(){
 let phone = document.getElementById("loginPhone").value;
 let data = JSON.parse(localStorage.getItem("trial")) || [];

 let user = data.find(d => d.phone === phone);

 if(user){
  document.getElementById("userLogin").classList.add("hidden");
  document.getElementById("userProfile").classList.remove("hidden");

  document.getElementById("profileData").innerHTML =
   "Name: " + user.name + "<br>Phone: " + user.phone + "<br>Product: " + user.product;
 } else {
  alert("No Data Found!");
 }
}

// ADMIN LOGIN (default)
localStorage.setItem("adminUser","admin");
localStorage.setItem("adminPass","1234");

function adminLogin(){
 let u = document.getElementById("adminUser").value;
 let p = document.getElementById("adminPass").value;

 if(u==="admin" && p==="1234"){
  showAdmin();
 } else {
  alert("Wrong Login");
 }
}

// LOAD DATA
function showAdmin(){
 hideAll();
 document.getElementById("admin").classList.remove("hidden");

 let data = JSON.parse(localStorage.getItem("trial")) || [];
 let html="";

 data.forEach(d=>{
  html += `<tr>
   <td>${d.name}</td>
   <td>${d.phone}</td>
   <td>${d.product}</td>
  </tr>`;
 });

 document.getElementById("data").innerHTML = html;
}

// NAVIGATION
function showUserLogin(){
 hideAll();
 document.getElementById("userLogin").classList.remove("hidden");
}

function showAdminLogin(){
 hideAll();
 document.getElementById("adminLogin").classList.remove("hidden");
}

function logout(){
 hideAll();
 document.getElementById("home").classList.remove("hidden");
}

function hideAll(){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("userLogin").classList.add("hidden");
 document.getElementById("userProfile").classList.add("hidden");
 document.getElementById("adminLogin").classList.add("hidden");
 document.getElementById("admin").classList.add("hidden");
}

</script>

</body>
</html>
