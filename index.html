<!DOCTYPE html>
<html>
<head>
<title>Sunglasses Home Trial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
 margin:0;
 font-family:'Segoe UI';
 background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
 url('https://images.unsplash.com/photo-1511499767150-a48a237f0083') no-repeat center/cover;
 color:white;
}

header {
 text-align:center;
 padding:15px;
 font-size:22px;
 background:rgba(0,0,0,0.6);
}

.main { display:flex; }

.sidebar {
 width:260px;
 padding:20px;
 background:rgba(0,0,0,0.8);
 height:100vh;
}

.sidebar input {
 width:100%;
 padding:10px;
 margin:8px 0;
 border:none;
 border-radius:5px;
}

.sidebar button {
 width:100%;
 padding:10px;
 margin-top:5px;
 background:#ff6600;
 border:none;
 color:white;
 border-radius:5px;
 cursor:pointer;
}

.content {
 flex:1;
 padding:20px;
}

.search {
 width:100%;
 padding:10px;
 border-radius:5px;
 border:none;
 margin-bottom:15px;
}

.products {
 display:grid;
 grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
 gap:15px;
}

.product {
 background:white;
 color:black;
 padding:10px;
 border-radius:10px;
 text-align:center;
}

.product img {
 width:100%;
 height:150px;
 object-fit:cover;
 border-radius:10px;
}

.btn {
 margin-top:5px;
 padding:7px;
 background:#ff6600;
 border:none;
 color:white;
 border-radius:5px;
 cursor:pointer;
}

/* MODAL */
.modal {
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.7);
 display:flex;
 justify-content:center;
 align-items:center;
}

.modal-box {
 background:white;
 color:black;
 padding:20px;
 border-radius:10px;
 width:300px;
 text-align:center;
}

.hidden { display:none; }

table {
 width:100%;
 background:white;
 color:black;
 border-collapse: collapse;
}

th, td {
 padding:10px;
 border-bottom:1px solid #ccc;
}
</style>
</head>

<body>

<header>👓 Sunglasses Home Trial</header>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>Book Trial</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile">
<input id="product" placeholder="Selected Product" readonly>

<button onclick="saveTrial()">Submit</button>

<h3>Account</h3>
<button onclick="openUser()">User Login</button>
<button onclick="openAdminRegister()">Admin Register</button>
<button onclick="openAdmin()">Admin Login</button>

</div>

<!-- CONTENT -->
<div class="content">

<input class="search" placeholder="🔍 Search sunglasses..." onkeyup="search(this.value)">

<div class="products" id="products"></div>

<!-- ADMIN DASHBOARD -->
<div id="adminPage" class="hidden">
<h2>📊 Trial Users</h2>
<table>
<tr><th>Name</th><th>Phone</th><th>Product</th></tr>
<tbody id="data"></tbody>
</table>
</div>

</div>

</div>

<!-- USER LOGIN -->
<div id="userModal" class="modal hidden">
<div class="modal-box">
<h3>User Login</h3>
<input id="loginPhone" placeholder="Mobile"><br><br>
<button onclick="userLogin()">Login</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- ADMIN REGISTER -->
<div id="adminRegisterModal" class="modal hidden">
<div class="modal-box">
<h3>Admin Register</h3>
<input id="ruser" placeholder="Username"><br>
<input id="rpass" type="password" placeholder="Password"><br><br>
<button onclick="registerAdmin()">Register</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminModal" class="modal hidden">
<div class="modal-box">
<h3>Admin Login</h3>
<input id="luser" placeholder="Username"><br>
<input id="lpass" type="password" placeholder="Password"><br><br>
<button onclick="adminLogin()">Login</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* ONLY SUNGLASSES IMAGES */
let products = [
 {name:"Black Aviator", img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083?auto=format&fit=crop&w=400&q=80"},
 {name:"Brown Classic", img:"https://images.unsplash.com/photo-1491553895911-0055eca6402d?auto=format&fit=crop&w=400&q=80"},
 {name:"Blue Reflective", img:"https://images.unsplash.com/photo-1508296695146-257a814070b4?auto=format&fit=crop&w=400&q=80"},
 {name:"Golden Frame", img:"https://images.unsplash.com/photo-1487412912498-0447578fcca8?auto=format&fit=crop&w=400&q=80"},
 {name:"Sport Goggles", img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba3?auto=format&fit=crop&w=400&q=80"},
 {name:"Power Glass Frame", img:"https://images.unsplash.com/photo-1585386959984-a41552262a4c?auto=format&fit=crop&w=400&q=80"}
];

/* LOAD */
function load(){
 let html="";
 products.forEach(p=>{
  html+=`
  <div class="product">
   <img src="${p.img}">
   <h4>${p.name}</h4>
   <button class="btn" onclick="selectProduct('${p.name}')">Select</button>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}
load();

/* बाकी code same */
function search(v){
 document.querySelectorAll(".product").forEach(i=>{
  i.style.display=i.innerText.toLowerCase().includes(v.toLowerCase())?"block":"none";
 });
}

function selectProduct(p){ product.value=p; }

function saveTrial(){
 let data=JSON.parse(localStorage.getItem("trial"))||[];
 data.push({name:name.value,phone:phone.value,product:product.value});
 localStorage.setItem("trial",JSON.stringify(data));
 alert("Trial Booked!");
}

function userLogin(){
 let data=JSON.parse(localStorage.getItem("trial"))||[];
 let u=data.find(d=>d.phone===loginPhone.value);
 alert(u ? "Name: "+u.name+"\nProduct: "+u.product : "No record found");
}

function registerAdmin(){
 localStorage.setItem("adminUser",ruser.value);
 localStorage.setItem("adminPass",rpass.value);
 alert("Admin Registered!");
}

function adminLogin(){
 if(luser.value===localStorage.getItem("adminUser") &&
    lpass.value===localStorage.getItem("adminPass")){
   showAdmin();
 } else alert("Wrong Login");
}

function showAdmin(){
 adminPage.classList.remove("hidden");
 let data=JSON.parse(localStorage.getItem("trial"))||[];
 let html="";
 data.forEach(d=>{
  html+=`<tr><td>${d.name}</td><td>${d.phone}</td><td>${d.product}</td></tr>`;
 });
 document.getElementById("data").innerHTML=html;
}

function openUser(){ userModal.classList.remove("hidden"); }
function openAdmin(){ adminModal.classList.remove("hidden"); }
function openAdminRegister(){ adminRegisterModal.classList.remove("hidden"); }
function closeModal(){
 userModal.classList.add("hidden");
 adminModal.classList.add("hidden");
 adminRegisterModal.classList.add("hidden");
}

</script>

</body>
</html>
