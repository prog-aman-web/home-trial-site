<!DOCTYPE html>
<html>
<head>
  <title>Home Trial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #007bff;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background: #218838;
    }
  </style>
</head>

<body>

<header>
  <h1>🏠 Home Trial</h1>
  <p>Try at Home Before You Buy</p>
</header>

<div class="container">

  <div class="card">
    <h3>👓 Sunglasses</h3>
    <p>5 Days Home Trial</p>
    <a href="#" class="btn" onclick="alert('Trial Started!')">Start Trial</a>
  </div>

  <div class="card">
    <h3>👟 Shoes</h3>
    <p>7 Days Home Trial</p>
    <a href="#" class="btn" onclick="alert('Trial Started!')">Start Trial</a>
  </div>

  <div class="card">
    <h3>⌚ Watch</h3>
    <p>3 Days Home Trial</p>
    <a href="#" class="btn" onclick="alert('Trial Started!')">Start Trial</a>
  </div>

</div>

</body>
</html>
