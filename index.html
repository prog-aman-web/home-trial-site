<!DOCTYPE html>
<html>
<head>
<title>Sunglasses Home Trial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
 margin:0;
 font-family:'Segoe UI';
 background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
 url('https://images.unsplash.com/photo-1511499767150-a48a237f0083') no-repeat center/cover;
 color:white;
}

/* HEADER */
header {
 text-align:center;
 padding:15px;
 font-size:22px;
 background:rgba(0,0,0,0.6);
}

/* LAYOUT */
.main { display:flex; }

.sidebar {
 width:260px;
 padding:20px;
 background:rgba(0,0,0,0.85);
 height:100vh;
}

.sidebar input {
 width:100%;
 padding:10px;
 margin:8px 0;
 border:none;
 border-radius:6px;
}

.sidebar button {
 width:100%;
 padding:10px;
 margin-top:5px;
 background:#ff6600;
 border:none;
 color:white;
 border-radius:6px;
 cursor:pointer;
}

/* CONTENT */
.content {
 flex:1;
 padding:20px;
}

.products {
 display:grid;
 grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
 gap:15px;
}

.product {
 background:white;
 color:black;
 padding:10px;
 border-radius:10px;
 text-align:center;
}

.product img {
 width:100%;
 height:180px;
 object-fit:cover;
 border-radius:10px;
}

.price { color:green; font-weight:bold; }

.btn {
 margin-top:5px;
 padding:7px;
 background:#ff6600;
 border:none;
 color:white;
 border-radius:5px;
 cursor:pointer;
}

/* MODAL (BETTER UI) */
.modal {
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.8);
 display:flex;
 justify-content:center;
 align-items:center;
}

.modal-box {
 background:rgba(255,255,255,0.1);
 backdrop-filter:blur(10px);
 padding:25px;
 border-radius:15px;
 width:300px;
 text-align:center;
 border:1px solid rgba(255,255,255,0.2);
}

.modal-box input {
 width:90%;
 padding:10px;
 margin:10px;
 border:none;
 border-radius:5px;
}

.modal-box button {
 padding:10px;
 width:90%;
 margin-top:5px;
 background:#ff6600;
 border:none;
 color:white;
 border-radius:5px;
}

.hidden { display:none; }

/* ADMIN FULL PAGE */
#adminPage {
 position:absolute;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:#111;
 padding:20px;
}

table {
 width:100%;
 background:white;
 color:black;
 border-collapse: collapse;
}

th, td {
 padding:10px;
 border-bottom:1px solid #ccc;
}
</style>
</head>

<body>

<header>👓 Sunglasses Home Trial</header>

<div class="main" id="mainPage">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>Book Trial</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile">
<input id="product" placeholder="Selected Product" readonly>

<button onclick="saveTrial()">Submit</button>

<h3>Account</h3>
<button onclick="openUser()">User Login</button>
<button onclick="openAdminRegister()">Admin Register</button>
<button onclick="openAdmin()">Admin Login</button>

</div>

<!-- CONTENT -->
<div class="content">
<div class="products" id="products"></div>
</div>

</div>

<!-- ADMIN FULL SCREEN -->
<div id="adminPage" class="hidden">
<h2>📊 Trial Users</h2>
<button onclick="goHome()">⬅ Back</button>

<table>
<tr><th>Name</th><th>Phone</th><th>Product</th></tr>
<tbody id="data"></tbody>
</table>
</div>

<!-- USER LOGIN -->
<div id="userModal" class="modal hidden">
<div class="modal-box">
<h3>User Login</h3>
<input id="loginPhone" placeholder="Mobile">
<button onclick="userLogin()">Login</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- ADMIN REGISTER -->
<div id="adminRegisterModal" class="modal hidden">
<div class="modal-box">
<h3>Admin Register</h3>
<input id="ruser" placeholder="Username">
<input id="rpass" type="password" placeholder="Password">
<button onclick="registerAdmin()">Register</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminModal" class="modal hidden">
<div class="modal-box">
<h3>Admin Login</h3>
<input id="luser" placeholder="Username">
<input id="lpass" type="password" placeholder="Password">
<button onclick="adminLogin()">Login</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* PRODUCTS */
let products = [
 {name:"Black Aviator", price:"₹999", img:"https://images.unsplash.com/photo-1572635196237-14b3f281503f"},
 {name:"Classic Brown", price:"₹899", img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083"},
 {name:"Blue Reflective", price:"₹1199", img:"https://images.unsplash.com/photo-1508296695146-257a814070b4"},
 {name:"Golden Frame", price:"₹1499", img:"https://images.unsplash.com/photo-1511920170033-f8396924c348"},
 {name:"Sport Goggles", price:"₹799", img:"https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f"},
 {name:"Power Glass Frame", price:"₹699", img:"https://images.unsplash.com/photo-1585386959984-a41552262a4c"}
];

function load(){
 let html="";
 products.forEach(p=>{
  html+=`
  <div class="product">
   <img src="${p.img}?auto=format&fit=crop&w=400&q=80">
   <h4>${p.name}</h4>
   <div class="price">${p.price}</div>
   <button class="btn" onclick="selectProduct('${p.name}')">Select</button>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}
load();

/* FUNCTIONS */
function selectProduct(p){ product.value=p; }

function saveTrial(){
 let data=JSON.parse(localStorage.getItem("trial"))||[];
 data.push({name:name.value,phone:phone.value,product:product.value});
 localStorage.setItem("trial",JSON.stringify(data));
 alert("Trial Booked!");
}

function userLogin(){
 let data=JSON.parse(localStorage.getItem("trial"))||[];
 let u=data.find(d=>d.phone===loginPhone.value);
 alert(u ? "Name: "+u.name+"\nProduct: "+u.product : "No record found");
}

function registerAdmin(){
 localStorage.setItem("adminUser",ruser.value);
 localStorage.setItem("adminPass",rpass.value);
 alert("Admin Registered!");
}

function adminLogin(){
 if(luser.value===localStorage.getItem("adminUser") &&
    lpass.value===localStorage.getItem("adminPass")){
   showAdmin();
 } else alert("Wrong Login");
}

/* SHOW ADMIN FULL PAGE */
function showAdmin(){
 document.getElementById("mainPage").style.display="none";
 document.getElementById("adminPage").classList.remove("hidden");

 let data=JSON.parse(localStorage.getItem("trial"))||[];
 let html="";
 data.forEach(d=>{
  html+=`<tr><td>${d.name}</td><td>${d.phone}</td><td>${d.product}</td></tr>`;
 });
 document.getElementById("data").innerHTML=html;
}

/* BACK */
function goHome(){
 document.getElementById("mainPage").style.display="flex";
 document.getElementById("adminPage").classList.add("hidden");
}

/* MODAL */
function openUser(){ userModal.classList.remove("hidden"); }
function openAdmin(){ adminModal.classList.remove("hidden"); }
function openAdminRegister(){ adminRegisterModal.classList.remove("hidden"); }
function closeModal(){
 userModal.classList.add("hidden");
 adminModal.classList.add("hidden");
 adminRegisterModal.classList.add("hidden");
}

</script>

</body>
</html>
