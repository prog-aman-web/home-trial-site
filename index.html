<!DOCTYPE html>
<html>
<head>
<title>Home Trial</title>
</head>
<body>

<h1>🏠 Sunglasses Home Trial</h1>

<h2>Enquiry Form</h2>

<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="product" placeholder="Product"><br><br>

<button onclick="saveData()">Submit</button>

<br><br>
<a href="login.html">Admin Login</a>

<script>
function saveData(){
 let data = JSON.parse(localStorage.getItem("trial")) || [];

 data.push({
  name: document.getElementById("name").value,
  phone: document.getElementById("phone").value,
  product: document.getElementById("product").value
 });

 localStorage.setItem("trial", JSON.stringify(data));

 alert("Enquiry Saved!");
}
</script>

</body>
</html>
