<!DOCTYPE html>
<html>
<head>
<title>Sunglasses Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
 margin:0;
 font-family: 'Segoe UI';
 background:#0f172a;
 color:white;
}

/* HEADER */
header {
 background:#020617;
 padding:15px;
 text-align:center;
 font-size:22px;
 letter-spacing:1px;
}

/* LAYOUT */
.main {
 display:flex;
}

/* SIDEBAR */
.sidebar {
 width:260px;
 background:#020617;
 padding:20px;
 height:100vh;
 border-right:1px solid #1e293b;
}

.sidebar h3 {
 margin-top:0;
}

.sidebar input {
 width:100%;
 padding:10px;
 margin-bottom:10px;
 border:none;
 border-radius:5px;
}

.sidebar button {
 width:100%;
 padding:10px;
 margin-top:5px;
 background:#f97316;
 border:none;
 color:white;
 border-radius:5px;
 cursor:pointer;
}

/* CONTENT */
.content {
 flex:1;
 padding:20px;
}

/* SEARCH */
.search {
 width:100%;
 padding:10px;
 border-radius:5px;
 border:none;
 margin-bottom:20px;
}

/* GRID */
.products {
 display:grid;
 grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
 gap:15px;
}

.product {
 background:#1e293b;
 padding:10px;
 border-radius:10px;
 text-align:center;
 transition:0.3s;
}

.product:hover {
 transform:scale(1.03);
}

.product img {
 width:100%;
 border-radius:10px;
}

.btn {
 margin:3px;
 padding:7px;
 background:#f97316;
 border:none;
 color:white;
 border-radius:5px;
 cursor:pointer;
}

/* MODAL */
.modal {
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.7);
 display:flex;
 justify-content:center;
 align-items:center;
}

.modal-box {
 background:#1e293b;
 padding:20px;
 border-radius:10px;
 width:300px;
 text-align:center;
}

.hidden { display:none; }

/* TABLE */
table {
 width:100%;
 background:#1e293b;
 border-collapse: collapse;
}

th, td {
 padding:10px;
 border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<header>👓 Premium Sunglasses Store</header>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>Book Trial</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile">
<input id="product" placeholder="Selected Product" readonly>

<button onclick="saveTrial()">Book Trial</button>

<h3>Account</h3>
<button onclick="openUser()">User Login</button>
<button onclick="openAdmin()">Admin</button>

<h3>Extras</h3>
<button onclick="showCart()">Cart 🛒</button>
<button onclick="showWishlist()">Wishlist ❤️</button>

</div>

<!-- CONTENT -->
<div class="content">

<input class="search" placeholder="🔍 Search sunglasses..." onkeyup="search(this.value)">

<div class="products" id="products"></div>

<!-- CART -->
<div id="cartPage" class="hidden"></div>

<!-- WISHLIST -->
<div id="wishPage" class="hidden"></div>

<!-- ADMIN -->
<div id="adminPage" class="hidden">
<h2>Admin Dashboard</h2>
<table>
<tr><th>Name</th><th>Phone</th><th>Product</th></tr>
<tbody id="data"></tbody>
</table>
</div>

</div>

</div>

<!-- USER MODAL -->
<div id="userModal" class="modal hidden">
<div class="modal-box">
<h3>User Login</h3>
<input id="loginPhone" placeholder="Mobile"><br><br>
<button onclick="userLogin()">Login</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- ADMIN MODAL -->
<div id="adminModal" class="modal hidden">
<div class="modal-box">
<h3>Admin Login</h3>
<input id="adminPass" placeholder="Password"><br><br>
<button onclick="adminLogin()">Login</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* PRODUCTS */
let products = [
 {name:"Aviator Black", img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083"},
 {name:"Classic Brown", img:"https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f"},
 {name:"Blue Modern", img:"https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb"},
 {name:"Luxury Gold", img:"https://images.unsplash.com/photo-1487412912498-0447578fcca8"},
];

function load(){
 let html="";
 products.forEach(p=>{
  html+=`
  <div class="product">
  <img src="${p.img}">
  <h4>${p.name}</h4>
  <button class="btn" onclick="selectProduct('${p.name}')">Select</button>
  </div>`;
 });
 document.getElementById("products").innerHTML=html;
}
load();

/* SEARCH */
function search(v){
 document.querySelectorAll(".product").forEach(i=>{
  i.style.display=i.innerText.toLowerCase().includes(v.toLowerCase())?"block":"none";
 });
}

/* SELECT */
function selectProduct(p){
 product.value=p;
}

/* SAVE */
function saveTrial(){
 let data=JSON.parse(localStorage.getItem("trial"))||[];
 data.push({name:name.value,phone:phone.value,product:product.value});
 localStorage.setItem("trial",JSON.stringify(data));
 alert("Trial Booked");
}

/* USER LOGIN */
function userLogin(){
 let data=JSON.parse(localStorage.getItem("trial"))||[];
 let u=data.find(d=>d.phone===loginPhone.value);
 alert(u ? "Welcome "+u.name : "No data");
}

/* ADMIN */
function adminLogin(){
 if(adminPass.value==="1234"){
  showAdmin();
 }
}

function showAdmin(){
 adminPage.classList.remove("hidden");
 let data=JSON.parse(localStorage.getItem("trial"))||[];
 let html="";
 data.forEach(d=>{
  html+=`<tr><td>${d.name}</td><td>${d.phone}</td><td>${d.product}</td></tr>`;
 });
 document.getElementById("data").innerHTML=html;
}

/* MODAL */
function openUser(){ userModal.classList.remove("hidden"); }
function openAdmin(){ adminModal.classList.remove("hidden"); }
function closeModal(){
 userModal.classList.add("hidden");
 adminModal.classList.add("hidden");
}

/* CART/WISHLIST (basic) */
function showCart(){ alert("Cart feature connect with backend later"); }
function showWishlist(){ alert("Wishlist feature connect later"); }

</script>

</body>
</html>
