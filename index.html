<!DOCTYPE html>
<html>
<head>
<title>Sunglasses Home Trial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
 font-family: Arial;
 margin:0;
 background: linear-gradient(120deg,#1e3c72,#2a5298);
 color:white;
}

header {
 text-align:center;
 padding:20px;
 font-size:24px;
 font-weight:bold;
}

.container {
 text-align:center;
 padding:20px;
}

.card {
 background:white;
 color:black;
 padding:20px;
 border-radius:10px;
 margin:10px auto;
 width:300px;
 box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input {
 width:90%;
 padding:10px;
 margin:5px;
}

button {
 padding:10px 20px;
 background:#ff6600;
 color:white;
 border:none;
 cursor:pointer;
 border-radius:5px;
}

.hidden { display:none; }

table {
 width:95%;
 margin:auto;
 border-collapse: collapse;
 background:white;
 color:black;
}

th, td {
 border:1px solid black;
 padding:10px;
}

</style>
</head>

<body>

<header>👓 Sunglasses Home Trial System</header>

<div class="container">

<!-- HOME -->
<div id="home">
<div class="card">
<h3>Book Home Trial</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="product" placeholder="Sunglass Type">

<button onclick="saveData()">Submit</button>
</div>

<br>
<button onclick="showRegister()">Admin Register</button>
<button onclick="showLogin()">Admin Login</button>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
<div class="card">
<h3>Admin Registration</h3>

<input id="ruser" placeholder="Username">
<input id="rpass" type="password" placeholder="Password">

<button onclick="register()">Register</button>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
<div class="card">
<h3>Admin Login</h3>

<input id="luser" placeholder="Username">
<input id="lpass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin" class="hidden">

<h2>📊 Trial Users Data</h2>

<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Product</th>
</tr>
<tbody id="data"></tbody>
</table>

<br>
<button onclick="logout()">Logout</button>

</div>

</div>

<script>

// SAVE USER ENQUIRY
function saveData(){
 let data = JSON.parse(localStorage.getItem("trial")) || [];

 data.push({
  name: document.getElementById("name").value,
  phone: document.getElementById("phone").value,
  product: document.getElementById("product").value
 });

 localStorage.setItem("trial", JSON.stringify(data));
 alert("Trial Request Submitted!");
}

// ADMIN REGISTER
function register(){
 let user = document.getElementById("ruser").value;
 let pass = document.getElementById("rpass").value;

 localStorage.setItem("adminUser", user);
 localStorage.setItem("adminPass", pass);

 alert("Registered Successfully!");
 showLogin();
}

// ADMIN LOGIN
function login(){
 let user = document.getElementById("luser").value;
 let pass = document.getElementById("lpass").value;

 let storedUser = localStorage.getItem("adminUser");
 let storedPass = localStorage.getItem("adminPass");

 if(user === storedUser && pass === storedPass){
   showAdmin();
 } else {
   alert("Invalid Login!");
 }
}

// LOAD DATA
function loadData(){
 let data = JSON.parse(localStorage.getItem("trial")) || [];

 let html="";
 data.forEach(d=>{
  html += `<tr>
   <td>${d.name}</td>
   <td>${d.phone}</td>
   <td>${d.product}</td>
  </tr>`;
 });

 document.getElementById("data").innerHTML = html;
}

// NAVIGATION FUNCTIONS
function showRegister(){
 hideAll();
 document.getElementById("register").classList.remove("hidden");
}

function showLogin(){
 hideAll();
 document.getElementById("login").classList.remove("hidden");
}

function showAdmin(){
 hideAll();
 document.getElementById("admin").classList.remove("hidden");
 loadData();
}

function logout(){
 hideAll();
 document.getElementById("home").classList.remove("hidden");
}

function hideAll(){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("register").classList.add("hidden");
 document.getElementById("login").classList.add("hidden");
 document.getElementById("admin").classList.add("hidden");
}

</script>

</body>
</html>
