<!DOCTYPE html>
<html>
<head>
<title>Sunglasses Home Trial</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
 margin:0;
 font-family: 'Segoe UI', sans-serif;
 background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
 url('https://images.unsplash.com/photo-1508296695146-257a814070b4') no-repeat center/cover;
 color:white;
}

/* HEADER */
header {
 text-align:center;
 padding:15px;
 font-size:24px;
 font-weight:bold;
 background: rgba(0,0,0,0.6);
}

/* CONTAINER */
.container {
 display:flex;
 justify-content:center;
 align-items:center;
 min-height:90vh;
}

/* CARD PANEL */
.card {
 background:white;
 color:black;
 padding:25px;
 border-radius:12px;
 width:320px;
 box-shadow:0 10px 25px rgba(0,0,0,0.4);
 text-align:center;
}

/* INPUT */
input {
 width:90%;
 padding:10px;
 margin:8px;
 border-radius:5px;
 border:1px solid #ccc;
}

/* BUTTON */
button {
 padding:10px 20px;
 margin-top:10px;
 background:#ff6600;
 color:white;
 border:none;
 border-radius:5px;
 cursor:pointer;
}

button:hover {
 background:#e65c00;
}

.hidden { display:none; }

/* TABLE */
table {
 width:90%;
 margin:auto;
 margin-top:20px;
 border-collapse: collapse;
 background:white;
 color:black;
}

th, td {
 border:1px solid #ddd;
 padding:10px;
 text-align:center;
}

</style>
</head>

<body>

<header>👓 Sunglasses Store - Home Trial</header>

<div class="container">

<!-- HOME -->
<div id="home" class="card">
<h3>Book Home Trial</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile Number">
<input id="product" placeholder="Sunglass Type">
<button onclick="saveData()">Submit</button>

<br><br>
<button onclick="showUserLogin()">User Login</button>
<button onclick="showAdminRegister()">Admin Register</button>
<button onclick="showAdminLogin()">Admin Login</button>
</div>

<!-- USER LOGIN -->
<div id="userLogin" class="card hidden">
<h3>User Login</h3>
<input id="loginPhone" placeholder="Enter Mobile Number">
<button onclick="userLogin()">Login</button>
</div>

<!-- USER PROFILE -->
<div id="userProfile" class="card hidden">
<h3>Your Profile</h3>
<p id="profileData"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN REGISTER -->
<div id="adminRegister" class="card hidden">
<h3>Admin Registration</h3>
<input id="ruser" placeholder="Username">
<input id="rpass" type="password" placeholder="Password">
<button onclick="registerAdmin()">Register</button>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="card hidden">
<h3>Admin Login</h3>
<input id="luser" placeholder="Username">
<input id="lpass" type="password" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
<h2 style="text-align:center;">📊 Trial Users Data</h2>

<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Product</th>
</tr>
<tbody id="data"></tbody>
</table>

<div style="text-align:center;">
<button onclick="logout()">Logout</button>
</div>
</div>

</div>

<script>

// SAVE USER DATA
function saveData(){
 let data = JSON.parse(localStorage.getItem("trial")) || [];

 let user = {
  name: document.getElementById("name").value,
  phone: document.getElementById("phone").value,
  product: document.getElementById("product").value
 };

 data.push(user);
 localStorage.setItem("trial", JSON.stringify(data));

 alert("Trial Booked Successfully!");
}

// USER LOGIN
function userLogin(){
 let phone = document.getElementById("loginPhone").value;
 let data = JSON.parse(localStorage.getItem("trial")) || [];

 let user = data.find(d => d.phone === phone);

 if(user){
  hideAll();
  document.getElementById("userProfile").classList.remove("hidden");

  document.getElementById("profileData").innerHTML =
   "Name: " + user.name + "<br>Phone: " + user.phone + "<br>Product: " + user.product;
 } else {
  alert("No record found!");
 }
}

// ADMIN REGISTER
function registerAdmin(){
 let user = document.getElementById("ruser").value;
 let pass = document.getElementById("rpass").value;

 localStorage.setItem("adminUser", user);
 localStorage.setItem("adminPass", pass);

 alert("Admin Registered!");
 showAdminLogin();
}

// ADMIN LOGIN
function adminLogin(){
 let user = document.getElementById("luser").value;
 let pass = document.getElementById("lpass").value;

 let u = localStorage.getItem("adminUser");
 let p = localStorage.getItem("adminPass");

 if(user === u && pass === p){
  showAdminPanel();
 } else {
  alert("Invalid Login!");
 }
}

// ADMIN DATA LOAD
function showAdminPanel(){
 hideAll();
 document.getElementById("adminPanel").classList.remove("hidden");

 let data = JSON.parse(localStorage.getItem("trial")) || [];
 let html="";

 data.forEach(d=>{
  html += `<tr>
   <td>${d.name}</td>
   <td>${d.phone}</td>
   <td>${d.product}</td>
  </tr>`;
 });

 document.getElementById("data").innerHTML = html;
}

// NAVIGATION
function showUserLogin(){ hideAll(); document.getElementById("userLogin").classList.remove("hidden"); }
function showAdminRegister(){ hideAll(); document.getElementById("adminRegister").classList.remove("hidden"); }
function showAdminLogin(){ hideAll(); document.getElementById("adminLogin").classList.remove("hidden"); }
function logout(){ hideAll(); document.getElementById("home").classList.remove("hidden"); }

function hideAll(){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("userLogin").classList.add("hidden");
 document.getElementById("userProfile").classList.add("hidden");
 document.getElementById("adminRegister").classList.add("hidden");
 document.getElementById("adminLogin").classList.add("hidden");
 document.getElementById("adminPanel").classList.add("hidden");
}

</script>

</body>
</html>
